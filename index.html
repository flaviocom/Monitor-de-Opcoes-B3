<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Bollinger - Opções B3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e1a;
            --card: #151922;
            --border: #1f2937;
            --text: #e5e7eb;
            --text-dim: #9ca3af;
            --accent: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 1.8rem; font-weight: 600; }
        .disclosure {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid var(--yellow);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: var(--yellow);
            text-align: center;
        }
        .update-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .live-indicator {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .ticker {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .price {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-weight: 600;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.95rem;
        }
        .metric-label { color: var(--text-dim); }
        .metric-value { font-weight: 600; }
        .progress-container { margin-bottom: 20px; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
            transition: width 0.3s ease;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--accent);
            text-align: center;
        }
        .put-card, .call-card {
            background: rgba(59, 130, 246, 0.05);
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid var(--accent);
        }
        .option-title {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-code {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }
        .option-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Monitor de Opções B3</h1>
            <div class="update-info">
                <div class="live-indicator"></div>
                <span id="countdown">Atualizando em 15:00</span>
            </div>
        </header>

        <div class="disclosure">
            ⚠️ <strong>AVISO:</strong> Este painel é uma ferramenta de apoio educacional. 
            Não constitui recomendação de investimento. Decisões financeiras devem ser baseadas em avaliações próprias e profissionais.
        </div>

        <div class="grid" id="assets-grid"></div>
    </div>

    <script>
        const assetsData = [
            {
                ticker: 'PETR4',
                price: 49.88,
                sma200: 42.15,
                bands: {
                    daily: { upper: 52.00, lower: 35.52, label: 'Curto Prazo' },
                    weekly: { upper: 51.20, lower: 36.90, label: 'Longo Prazo' }
                },
                call: { code: 'PETRL521C5', strike: 52.00, premium: 1.36 }
            },
            {
                ticker: 'VALE3',
                price: 81.00,
                sma200: 76.80,
                bands: {
                    daily: { upper: 96.38, lower: 58.66, label: 'Curto Prazo' },
                    weekly: { upper: 94.20, lower: 61.80, label: 'Longo Prazo' }
                }
            },
            {
                ticker: 'BBAS3',
                price: 22.81,
                sma200: 24.50,
                bands: {
                    daily: { upper: 29.59, lower: 19.96, label: 'Curto Prazo' },
                    weekly: { upper: 28.80, middle: 25.00, lower: 21.20, label: 'Longo Prazo' }
                }
            },
            {
                ticker: 'ITUB4',
                price: 42.22,
                sma200: 38.90,
                bands: {
                    daily: { upper: 44.98, lower: 28.39, label: 'Curto Prazo' },
                    weekly: { upper: 45.20, lower: 29.80, label: 'Longo Prazo' }
                },
                call: { code: 'ITUBE449W2', strike: 44.67, premium: 0.98 }
            }
        ];

        function renderAssets() {
            const grid = document.getElementById('assets-grid');
            grid.innerHTML = '';

            assetsData.forEach(asset => {
                const isAboveTrend = asset.price > asset.sma200;
                
                const renderBand = (band) => {
                    const pos = ((asset.price - band.lower) / (band.upper - band.lower)) * 100;
                    return `
                        <div class="progress-container">
                            <div class="section-title">${band.label}</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${pos}%"></div>
                            </div>
                            <div class="progress-labels">
                                <span>Ponto Mínimo: R$ ${band.lower.toFixed(2)}</span>
                                <span>${pos.toFixed(0)}% da banda</span>
                                <span>Ponto Máximo: R$ ${band.upper.toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                };

                let strategyHTML = '';
                if (asset.price <= asset.bands.daily.lower) {
                    strategyHTML = `
                        <div class="put-card">
                            <div class="option-title">🟢 Oportunidade: Venda de Proteção (PUT)</div>
                            <div class="option-code">${asset.ticker}M${asset.bands.daily.lower.toFixed(0)}</div>
                            <div class="option-details">
                                <span>Preço alvo: R$ ${asset.bands.daily.lower.toFixed(2)}</span>
                                <span>Foco: Renda Recorrente</span>
                            </div>
                        </div>
                    `;
                } else {
                    const diff = ((asset.price - asset.bands.daily.lower) / asset.price * 100).toFixed(1);
                    strategyHTML = `<div class="alert-info">Aguardando queda de ${diff}% para sinal de entrada.</div>`;
                }

                if (asset.call && isAboveTrend) {
                    strategyHTML += `
                        <div class="call-card">
                            <div class="option-title">🟡 Caso tenha a ação: Venda Coberta (CALL)</div>
                            <div class="option-code">${asset.call.code}</div>
                            <div class="option-details">
                                <span>Strike: R$ ${asset.call.strike.toFixed(2)}</span>
                                <span>Renda extra sugerida</span>
                            </div>
                        </div>
                    `;
                }

                const card = `
                    <div class="card">
                        <div class="card-header">
                            <div class="ticker">${asset.ticker}</div>
                            <div class="price">R$ ${asset.price.toFixed(2)}</div>
                        </div>

                        <div class="metric">
                            <span class="metric-label">Tendência de Longo Prazo</span>
                            <span class="metric-value" style="color: ${isAboveTrend ? 'var(--green)' : 'var(--red)'}">
                                ${isAboveTrend ? 'Em Alta' : 'Em Queda'}
                            </span>
                        </div>

                        ${renderBand(asset.bands.daily)}
                        ${renderBand(asset.bands.weekly)}
                        
                        ${strategyHTML}
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        let timeLeft = 900;
        function updateCountdown() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('countdown').textContent = `Atualizando em ${m}:${s.toString().padStart(2, '0')}`;
            if (timeLeft === 0) { timeLeft = 900; renderAssets(); } else { timeLeft--; }
        }

        renderAssets();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
