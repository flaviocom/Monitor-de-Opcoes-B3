<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Opções B3 PRO | Antigravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { dark: { 900: '#030712', 800: '#111827', 700: '#1f2937' }, brand: { DEFAULT: '#3b82f6', purple: '#8b5cf6' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; color: #f3f4f6; min-height: 100vh; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#030712]">
    <nav class="sticky top-0 z-50 glass-card border-b border-dark-700/50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">ThetaLens <span class="text-xs bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded border border-amber-500/20">PRO</span></h1>
            <div class="flex items-center gap-4">
                <button id="btn-radar" onclick="toggleRadar()" class="flex items-center gap-2 px-3 py-1.5 rounded-md bg-dark-800 border border-dark-700 group hover:border-brand">
                    <span class="w-2 h-2 rounded-full bg-gray-500 group-[.active]:bg-emerald-500" id="radar-led"></span>
                    <span class="text-[11px] font-bold uppercase hidden sm:inline">Radar</span>
                </button>
                <div class="px-3 py-1.5 rounded-md bg-dark-800 border border-brand-purple/30">
                    <span class="text-[11px] font-bold text-brand-purple uppercase">DTE: <span id="dte-counter" class="text-white">--</span></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="mb-6 p-4 rounded-xl border border-rose-500/30 bg-rose-500/10 text-sm text-gray-300">
            <strong class="text-rose-400 font-bold uppercase">Aviso:</strong> Este painel é educacional. Não é recomendação. Decisões próprias e profissionais.
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="assets-grid"></div>
    </main>

    <div id="chart-modal" onclick="if(event.target===this)closeChart()" class="hidden fixed inset-0 z-999 bg-black/80 backdrop-blur-md items-center justify-center p-4">
        <div class="bg-[#111827] border border-gray-800 rounded-xl w-full max-w-4xl overflow-hidden shadow-2xl">
           <div class="p-4 border-b border-gray-800 flex justify-between items-center"><h3 id="modal-ticker" class="text-xl font-bold text-white"></h3><button onclick="closeChart()" class="text-gray-400 hover:text-white">X</button></div>
           <div id="chart-container" class="h-[400px]"></div>
        </div>
    </div>

    <script>
        const assetsData = [
            { ticker: 'PETR4', company: 'Petrobras', price: 0, change: 0, bands: { daily: { upper: 0, lower: 0 } } },
            { ticker: 'VALE3', company: 'Vale S.A.', price: 0, change: 0, bands: { daily: { upper: 0, lower: 0 } } },
            { ticker: 'BBAS3', company: 'Banco do Brasil', price: 0, change: 0, bands: { daily: { upper: 0, lower: 0 } } },
            { ticker: 'ITUB4', company: 'Ita&uacute; Unibanco', price: 0, change: 0, bands: { daily: { upper: 0, lower: 0 } } }
        ];

        const fmtMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        const BRAPI_TOKEN = 'ip1K3nN5Z9vhEgZ8jbiyHT';

        async function fetchPrices() {
            for(const a of assetsData) {
                try {
                    const r = await fetch(`https://brapi.dev/api/quote/${a.ticker}?range=1mo&interval=1d&token=${BRAPI_TOKEN}`);
                    const d = await r.json();
                    if(d.results?.[0]) {
                        const q = d.results[0];
                        a.price = q.regularMarketPrice;
                        a.change = q.regularMarketChangePercent;
                        const h = q.historicalDataPrice.map(x => x.close).filter(x => x > 0);
                        if(h.length >= 20) {
                            const m = h.slice(-20).reduce((s, x) => s + x, 0) / 20;
                            const sd = Math.sqrt(h.slice(-20).reduce((s, x) => s + (x-m)**2, 0) / 19);
                            a.bands.daily.upper = m + 2*sd;
                            a.bands.daily.lower = m - 2*sd;
                        }
                    }
                } catch(e) {}
            }
            render();
        }

        function render() {
            const g = document.getElementById('assets-grid'); g.innerHTML = '';
            for(const a of assetsData) {
                const p = a.bands.daily.upper > a.bands.daily.lower ? Math.max(0, Math.min(100, ((a.price - a.bands.daily.lower) / (a.bands.daily.upper - a.bands.daily.lower)) * 100)) : 0;
                const statusColor = p < 20 ? 'bg-emerald-500' : p > 80 ? 'bg-rose-500' : 'bg-brand';
                g.innerHTML += `
                    <div class="glass-card p-6 rounded-2xl shadow-lg">
                        <div class="flex justify-between mb-4">
                            <div><h3 class="text-2xl font-bold text-white">${a.ticker}</h3><p class="text-xs text-gray-500">${a.company}</p></div>
                            <div class="text-right"><p class="text-xl font-mono font-bold">${fmtMoney(a.price)}</p><p class="text-xs font-mono \$\{a.change >= 0 ? 'text-emerald-500' : 'text-rose-500'\}">${a.change >= 0 ? '+' : ''}${a.change.toFixed(2)}%</p></div>
                        </div>
                        <div class="mt-4">
                            <div class="flex justify-between text-[11px] mb-2 uppercase font-bold text-gray-500"><span>Banda Diária</span><span class="${statusColor.replace('bg-', 'text-')}">${Math.round(p)}%</span></div>
                            <div class="w-full h-2 bg-gray-800 rounded-full overflow-hidden border border-gray-700/50">
                                <div class="h-full ${statusColor} transition-all duration-1000" style="width: ${p}%"></div>
                            </div>
                        </div>
                        <button onclick="openChart('${a.ticker}')" class="w-full mt-6 py-2.5 bg-dark-800 border border-dark-700 rounded-xl text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white hover:border-brand transition-all">Análise Técnica</button>
                    </div>`;
            }
        }

        function updateDTE() {
            const d = document.getElementById('dte-counter');
            const now = new Date();
            let t = new Date(now.getFullYear(), now.getMonth(), 15);
            while(t.getDay() !== 5) t.setDate(t.getDate() + 1);
            if(now > t) { t = new Date(now.getFullYear(), now.getMonth()+1, 15); while(t.getDay() !== 5) t.setDate(t.getDate() + 1); }
            if(d) d.textContent = Math.ceil((t - now) / 864e5);
        }

        async function toggleRadar() {
            const b = document.getElementById('btn-radar');
            if(b.classList.toggle('active')) {
                const p = await Notification.requestPermission();
                if(p === 'granted') new Notification("Radar ThetaLens PRO", { body: "Monitoramento de limites ativado." });
                else b.classList.remove('active');
            }
        }

        function openChart(t) { document.getElementById('modal-ticker').textContent = t; document.getElementById('chart-modal').classList.remove('hidden'); document.getElementById('chart-modal').classList.add('flex'); loadChart(t); }
        function closeChart() { document.getElementById('chart-modal').classList.add('hidden'); document.getElementById('chart-modal').classList.remove('flex'); }
        async function loadChart(t) {
            const container = document.getElementById('chart-container'); container.innerHTML = '';
            try {
                const r = await fetch(`https://brapi.dev/api/quote/${t}?range=3mo&interval=1d&token=${BRAPI_TOKEN}`);
                const d = await r.json();
                const h = d.results[0].historicalDataPrice;
                const chart = LightweightCharts.createChart(container, { width: container.offsetWidth, height: 400, layout: { background: { color: 'transparent' }, textColor: '#ccc' }, grid: { vertLines: { color: '#222' }, horzLines: { color: '#222' } } });
                const s = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false });
                s.setData(h.map(x => ({ time: x.date, open: x.open, high: x.high, low: x.low, close: x.close })));
                chart.timeScale().fitContent();
            } catch(e) {}
        }

        updateDTE(); setInterval(updateDTE, 60000); fetchPrices();
    </script>
</body>
</html>
